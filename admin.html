<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BRIMES Signals - Admin</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0a0e17;
    color: #e8eaed;
    padding: 20px;
  }
  .header {
    font-size: 22px;
    font-weight: 700;
    color: #3b82f6;
    margin-bottom: 20px;
    text-align: center;
  }
  .login-card {
    max-width: 360px;
    margin: 80px auto;
    background: #131826;
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 28px;
  }
  .login-card input {
    width: 100%;
    background: #0d1320;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 12px;
    color: #e8eaed;
    margin-bottom: 12px;
  }
  .login-card button {
    width: 100%;
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-weight: 600;
    cursor: pointer;
  }
  #adminPanel { display: none; max-width: 720px; margin: 0 auto; }

  .settings-card {
    background: #131826;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 24px;
  }
  .settings-card .title { font-weight: 700; font-size: 15px; margin-bottom: 12px; color: #3b82f6; }
  .settings-card label { display: block; font-size: 12px; color: #9ca3af; margin-bottom: 4px; }
  .settings-row { display: flex; gap: 10px; margin-bottom: 10px; }
  .settings-row input {
    flex: 1;
    background: #0d1320;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 10px;
    color: #e8eaed;
    font-size: 14px;
  }
  .settings-card button {
    background: #3b82f6;
    color: white;
    border: none;
    border-radius: 8px;
    padding: 10px 16px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
  }
  .saved-note { color: #6ee7b7; font-size: 12px; margin-top: 8px; display: none; }

  .request-card {
    background: #131826;
    border: 1px solid #1f2937;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .request-card .name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .request-card .meta { color: #9ca3af; font-size: 13px; margin-bottom: 10px; line-height: 1.6; }
  .request-card .meta .txid {
    color: #fbbf24;
    word-break: break-all;
    font-family: monospace;
    font-size: 12px;
    background: #0d1320;
    padding: 4px 6px;
    border-radius: 4px;
    display: inline-block;
    margin-top: 2px;
  }
  .actions { display: flex; gap: 10px; }
  .btn-approve, .btn-reject {
    flex: 1;
    padding: 10px;
    border-radius: 8px;
    border: none;
    font-weight: 600;
    cursor: pointer;
    font-size: 14px;
  }
  .btn-approve { background: #059669; color: white; }
  .btn-reject { background: #dc2626; color: white; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    margin-left: 6px;
  }
  .badge.pending { background: #92400e; color: #fde68a; }
  .badge.approved { background: #064e3b; color: #6ee7b7; }
  .badge.rejected { background: #4c1d1d; color: #fca5a5; }
  .empty { text-align: center; color: #6b7280; padding: 40px; }
</style>
</head>
<body>

<div id="loginScreen" class="login-card">
  <div class="header">🔒 Admin Login</div>
  <input type="password" id="adminPass" placeholder="Enter admin password">
  <button onclick="login()">Login</button>
</div>

<div id="adminPanel">
  <div class="header">📊 BRIMES Signals Admin</div>

  <div class="settings-card">
    <div class="title">💰 Payment Settings</div>
    <label>Subscription Price (USDT)</label>
    <div class="settings-row">
      <input type="number" id="priceInput" placeholder="e.g. 10">
    </div>
    <label>USDT Wallet Address (TRC20)</label>
    <div class="settings-row">
      <input type="text" id="walletInput" placeholder="TRm6cc...">
    </div>
    <button onclick="saveSettings()">Save Settings</button>
    <div class="saved-note" id="savedNote">✅ Saved successfully</div>
  </div>

  <div class="header" style="font-size:18px;text-align:left;">Channel Requests</div>
  <div id="requestsList"></div>
</div>

<script>
const ADMIN_PASSWORD = "brimes2026";

function login() {
  const input = document.getElementById('adminPass').value;
  if (input === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    loadRequests();
    loadSettings();
  } else {
    alert('Wrong password');
  }
}

async function loadSettings() {
  try {
    const res = await fetch('/api/get-settings');
    const data = await res.json();
    if (data) {
      document.getElementById('priceInput').value = data.price || '';
      document.getElementById('walletInput').value = data.wallet || '';
    }
  } catch (err) {
    console.error('Failed to load settings', err);
  }
}

async function saveSettings() {
  const price = document.getElementById('priceInput').value;
  const wallet = document.getElementById('walletInput').value;

  try {
    await fetch('/api/save-settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ price, wallet })
    });
    const note = document.getElementById('savedNote');
    note.style.display = 'block';
    setTimeout(() => note.style.display = 'none', 2000);
  } catch (err) {
    alert('Failed to save settings');
  }
}

async function loadRequests() {
  const list = document.getElementById('requestsList');
  list.innerHTML = '<div class="empty">Loading...</div>';

  try {
    const res = await fetch('/api/list-channels');
    const data = await res.json();

    if (!data.channels || data.channels.length === 0) {
      list.innerHTML = '<div class="empty">No requests yet</div>';
      return;
    }

    list.innerHTML = data.channels.map(ch => `
      <div class="request-card">
        <div class="name">${ch.channelName} <span class="badge ${ch.status}">${ch.status}</span></div>
        <div class="meta">
          Chat ID: ${ch.chatId}<br>
          Telegram: ${ch.username}<br>
          Email: ${ch.email}<br>
          ${ch.txid ? `TXID: <span class="txid">${ch.txid}</span><br>` : ''}
          Submitted: ${new Date(ch.submittedAt).toLocaleString()}
        </div>
        ${ch.status === 'pending' ? `
        <div class="actions">
          <button class="btn-approve" onclick="updateStatus('${ch.key}', 'approved')">Approve</button>
          <button class="btn-reject" onclick="updateStatus('${ch.key}', 'rejected')">Reject</button>
        </div>` : ''}
      </div>
    `).join('');

  } catch (err) {
    list.innerHTML = '<div class="empty">Error loading requests</div>';
  }
}

async function updateStatus(key, status) {
  await fetch('/api/update-channel-status', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ key, status })
  });
  loadRequests();
}
</script>

</body>
</html>
